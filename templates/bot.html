<!DOCTYPE html>
<html>
<head>
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- FLOAT BUTTON -->
<div id="chat-toggle" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div id="chat-container">
    <div id="chat-header">
        <span>Medical Assistant</span>
        <span class="close-btn" onclick="toggleChat()">✖</span>
    </div>

    <div id="chatbox"></div>

    <div id="typing" style="display:none;">Bot is typing...</div>

    <div id="chat-input">
        <input type="text" id="message" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
let isOpen = false;

function toggleChat() {
    let chat = document.getElementById("chat-container");
    isOpen = !isOpen;
    chat.style.display = isOpen ? "flex" : "none";
}

function sendMessage() {
    let input = document.getElementById("message");
    let msg = input.value;

    if(msg.trim() === "") return;

    addMessage("user", msg);
    input.value = "";

    // SHOW TYPING
    document.getElementById("typing").style.display = "block";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        // HIDE TYPING
        document.getElementById("typing").style.display = "none";

        addMessage("bot", data.reply);

        if(data.intent === "booking") {
            showBookingForm();
        }
    });
}

function addMessage(sender, text) {
    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `
        <div class="${sender}">
            <div class="bubble">${text}</div>
        </div>
    `;

    chatbox.scrollTop = chatbox.scrollHeight;
}

function showBookingForm() {
    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `
        <div class="booking-form">
            <input id="name" placeholder="Name"><br>
            <input id="phone" placeholder="Phone"><br>
            <input id="issue" placeholder="Issue"><br>
            <input id="time" placeholder="Time"><br>
            <button onclick="saveBooking()">Book Appointment</button>
        </div>
    `;
}

function saveBooking() {
    let data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        issue: document.getElementById("issue").value,
        time: document.getElementById("time").value
    };

    fetch("/save-booking", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        addMessage("bot", data.reply);
    });
}
</script>

</body>
</html>
